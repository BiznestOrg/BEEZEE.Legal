<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEEZEE — Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }
        .doc-section {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .doc-section h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #1a1a2e;
        }
        .lang-links {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .lang-links a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s;
        }
        .lang-links a:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }
        .coming-soon {
            color: #9ca3af;
            font-size: 0.9rem;
            font-style: italic;
        }
        footer {
            margin-top: 2rem;
            color: #9ca3af;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">BEEZEE</div>
        <p class="subtitle">EasyManagement Platform — Legal Documents</p>

        <div class="doc-section">
            <h2>Privacy Policy</h2>
            <div class="lang-links">
                <a href="privacy-policy/en.html">🇬🇧 English</a>
                <a href="privacy-policy/pl.html">🇵🇱 Polski</a>
                <a href="privacy-policy/uk.html">🇺🇦 Українська</a>
            </div>
        </div>

        <div class="doc-section">
            <h2>Terms of Use</h2>
            <div class="lang-links">
                <a href="terms-of-use/en.html">🇬🇧 English</a>
                <a href="terms-of-use/pl.html">🇵🇱 Polski</a>
                <a href="terms-of-use/uk.html">🇺🇦 Українська</a>
            </div>
        </div>
    </div>

    <footer>© 2026 BEEZEE</footer>
</body>
</html>
